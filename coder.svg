<svg width="380" height="380" viewBox="0 0 380 380" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes eye-blink{0%,88%,100%{transform:scaleY(1)}94%{transform:scaleY(0.08)}}
@keyframes headbob{0%,100%{transform:translateY(0) rotate(0deg)}30%{transform:translateY(-3px) rotate(-2deg)}70%{transform:translateY(-1px) rotate(1deg)}}
@keyframes armtype{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-4deg)}}
@keyframes float1{0%,100%{transform:translateY(0) rotate(-6deg);opacity:1}50%{transform:translateY(-14px) rotate(-6deg);opacity:.7}}
@keyframes float2{0%,100%{transform:translateY(0) rotate(4deg);opacity:.8}50%{transform:translateY(-10px) rotate(4deg);opacity:.5}}
@keyframes steam{0%,100%{transform:translateY(0);opacity:.6}50%{transform:translateY(-8px);opacity:0}}
@keyframes cursor{0%,100%{opacity:1}50%{opacity:0}}
@keyframes glow{0%,100%{opacity:.3}50%{opacity:.7}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}

.bob{animation:bob 2.4s ease-in-out infinite}
.head{animation:headbob 2.4s ease-in-out infinite;transform-origin:190px 120px}
.blink{animation:eye-blink 3.5s ease-in-out infinite;transform-origin:178px 112px}
.blink2{animation:eye-blink 3.5s ease-in-out infinite .4s;transform-origin:204px 112px}
.type-arms{animation:armtype 0.35s ease-in-out infinite;transform-origin:190px 180px}
.float1{animation:float1 3s ease-in-out infinite;transform-origin:80px 120px}
.float2{animation:float2 3.8s ease-in-out infinite .6s;transform-origin:300px 130px}
.steam1{animation:steam 1.6s ease-in-out infinite}
.steam2{animation:steam 1.6s ease-in-out infinite .4s}
.steam3{animation:steam 1.6s ease-in-out infinite .8s}
.cursor{animation:cursor 1s step-end infinite}
.glow{animation:glow 2s ease-in-out infinite}
.sparkle1{animation:sparkle 2s ease-in-out infinite}
.sparkle2{animation:sparkle 2s ease-in-out infinite .7s}
.sparkle3{animation:sparkle 2s ease-in-out infinite 1.3s}
</style>

  <!-- background card -->
  <rect x="30" y="30" width="320" height="320" rx="60" fill="#1a1a2e"/>
  <rect x="34" y="34" width="312" height="312" rx="57" fill="none" stroke="#7c5cbf" stroke-width="1.5" opacity="0.6"/>

  <!-- sparkles -->
  <circle cx="70" cy="70" r="2" fill="#7c5cbf" opacity="0.5" class="sparkle1"/>
  <circle cx="310" cy="80" r="1.5" fill="#58a6ff" opacity="0.5" class="sparkle2"/>
  <circle cx="320" cy="300" r="2" fill="#3fb950" opacity="0.5" class="sparkle3"/>
  <circle cx="60" cy="300" r="1.5" fill="#f0883e" opacity="0.4" class="sparkle1"/>

  <!-- floating code left -->
  <g class="float1">
    <rect x="48" y="108" width="64" height="36" rx="6" fill="#0d2137" stroke="#378add" stroke-width="1"/>
    <text x="55" y="121" font-family="monospace" font-size="8" fill="#58a6ff">const dev</text>
    <text x="55" y="133" font-family="monospace" font-size="8" fill="#3fb950">= "akhil"</text>
  </g>

  <!-- floating code right -->
  <g class="float2">
    <rect x="258" y="100" width="64" height="50" rx="6" fill="#0d2137" stroke="#3fb950" stroke-width="1"/>
    <text x="265" y="115" font-family="monospace" font-size="7.5" fill="#f0883e">async fn</text>
    <text x="265" y="126" font-family="monospace" font-size="7.5" fill="#58a6ff">  code()</text>
    <text x="265" y="137" font-family="monospace" font-size="7.5" fill="#3fb950">  {}</text>
  </g>

  <!-- glow ring -->
  <circle cx="190" cy="200" r="85" fill="none" stroke="#7c5cbf" stroke-width="0.5" opacity="0.2" class="glow"/>

  <!-- body group bobs -->
  <g class="bob">

    <!-- head group -->
    <g class="head">
      <!-- hat -->
      <rect x="154" y="72" width="72" height="44" rx="22" fill="#4a3060"/>
      <rect x="152" y="78" width="76" height="14" rx="7" fill="#7c5cbf" opacity="0.7"/>
      <circle cx="154" cy="94" r="5" fill="#7c5cbf"/>
      <circle cx="226" cy="94" r="5" fill="#7c5cbf"/>
      <text x="180" y="92" font-family="monospace" font-size="10" fill="#e0d0ff" font-weight="bold">&lt;/&gt;</text>
      <!-- face -->
      <ellipse cx="190" cy="120" rx="46" ry="44" fill="#f5c6a0"/>
      <!-- eyes -->
      <ellipse cx="178" cy="112" rx="10" ry="5" fill="#1a1a2e" class="blink"/>
      <ellipse cx="204" cy="112" rx="10" ry="5" fill="#1a1a2e" class="blink2"/>
      <circle cx="178" cy="112" r="3.5" fill="#58a6ff"/>
      <circle cx="204" cy="112" r="3.5" fill="#58a6ff"/>
      <circle cx="179" cy="111" r="1.2" fill="white"/>
      <circle cx="205" cy="111" r="1.2" fill="white"/>
      <!-- mouth -->
      <path d="M 182 128 Q 190 134 198 128" fill="none" stroke="#c27b5c" stroke-width="1.8" stroke-linecap="round"/>
      <!-- blush -->
      <ellipse cx="168" cy="122" rx="7" ry="5" fill="#f0a080" opacity="0.5"/>
      <ellipse cx="212" cy="122" rx="7" ry="5" fill="#f0a080" opacity="0.5"/>
    </g>

    <!-- body -->
    <rect x="168" y="156" width="44" height="52" rx="14" fill="#5b3fa0"/>
    <rect x="174" y="160" width="32" height="12" rx="4" fill="#7c5cbf" opacity="0.5"/>
    <text x="181" y="168" font-family="monospace" font-size="8" fill="#e0d0ff">{ }</text>

    <!-- arms typing -->
    <g class="type-arms">
      <rect x="154" y="180" width="14" height="38" rx="7" fill="#f5c6a0" transform="rotate(-15,154,180)"/>
      <rect x="212" y="180" width="14" height="38" rx="7" fill="#f5c6a0" transform="rotate(15,212,180)"/>
      <ellipse cx="156" cy="222" rx="8" ry="7" fill="#f5c6a0"/>
      <ellipse cx="225" cy="222" rx="8" ry="7" fill="#f5c6a0"/>
    </g>

    <!-- lower body -->
    <rect x="168" y="208" width="44" height="30" rx="8" fill="#3a2a70"/>
    <rect x="172" y="238" width="36" height="18" rx="6" fill="#f5c6a0"/>
    <rect x="170" y="252" width="18" height="12" rx="4" fill="#4a3060"/>
    <rect x="192" y="252" width="18" height="12" rx="4" fill="#4a3060"/>

  </g>

  <!-- laptop -->
  <rect x="140" y="290" width="100" height="60" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <rect x="140" y="290" width="100" height="18" rx="6" fill="#21262d"/>
  <rect x="140" y="302" width="100" height="6" fill="#21262d"/>
  <circle cx="152" cy="299" r="3.5" fill="#ff5f57"/>
  <circle cx="164" cy="299" r="3.5" fill="#febc2e"/>
  <circle cx="176" cy="299" r="3.5" fill="#28c840"/>
  <text x="150" y="323" font-family="monospace" font-size="7" fill="#58a6ff">npm run dev</text>
  <text x="150" y="334" font-family="monospace" font-size="7" fill="#3fb950">  ready :3000</text>
  <rect x="150" y="337" width="3" height="7" rx="1" fill="#e6edf3" class="cursor"/>
  <rect x="140" y="346" width="100" height="4" rx="3" fill="#1c1c1c"/>

  <!-- coffee cup -->
  <g transform="translate(64,278)">
    <path d="M6 14 Q8 6 10 14" fill="none" stroke="#888" stroke-width="1.5" class="steam1"/>
    <path d="M12 12 Q14 4 16 12" fill="none" stroke="#888" stroke-width="1.5" class="steam2"/>
    <path d="M18 14 Q20 6 22 14" fill="none" stroke="#888" stroke-width="1.5" class="steam3"/>
    <rect x="0" y="20" width="28" height="32" rx="5" fill="#c0392b"/>
    <rect x="4" y="20" width="20" height="8" rx="3" fill="#922b21"/>
    <path d="M28 28 Q38 28 36 36 Q34 44 28 44" fill="none" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="6" y="26" width="16" height="4" rx="2" fill="#f9a825" opacity="0.7"/>
  </g>

</svg>
